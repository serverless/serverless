name: 'CI: Engine'

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci-engine.yml'
      - 'packages/engine/**'

jobs:
  test-engine:
    name: 'Test: Engine'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: 'Setup: Node.js'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          check-latest: true
          cache: npm

      - name: 'Install: Dependencies'
        run: npm ci

      - name: 'Test: Unit'
        working-directory: packages/engine
        run: npm test
