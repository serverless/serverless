name: 'CI: Engine'

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci-engine.yml'
      - 'packages/engine/**'

jobs:
  test-engine:
    name: 'Test: Engine'
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: 'Setup: Node.js'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          check-latest: true
          cache: npm

      - name: 'Setup: Enable Corepack'
        run: corepack enable npm

      - name: 'Install: Dependencies'
        run: npm ci

      - name: 'Test: Unit'
        working-directory: packages/engine
        run: npm test
