name: 'CI: Framework CLI'

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'

jobs:
  lint:
    name: 'Lint'
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 'Setup: Node.js'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          check-latest: true
          cache: npm
      - name: 'Setup: Enable Corepack'
        run: corepack enable npm
      - name: 'Install: Dependencies'
        run: npm ci
      - name: 'Lint: ESLint'
        run: npm run lint
      - name: 'Lint: Prettier'
        run: npm run prettier
      - name: 'Lint: Agent Skills'
        run: node packages/sf-core/scripts/lint-skills.js

  test-engine:
    name: 'Test: Engine'
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/engine
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 'Setup: Node.js'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          check-latest: true
          cache: npm
      - name: 'Setup: Enable Corepack'
        run: corepack enable npm
      - name: 'Install: Dependencies'
        run: |
          cd ../../
          npm ci
      - name: 'Test: Engine Unit'
        run: npm test

  test-framework:
    name: 'Test: Framework'
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/sf-core
    steps:
      - name: 'Checkout Code'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 'Setup: Node.js'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          check-latest: true
          cache: npm
      - name: 'Setup: Enable Corepack'
        run: corepack enable npm
      - name: 'Setup: AWS Credentials'
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::762003938904:role/GithubActionsDeploymentRole
          aws-region: us-east-1
      - name: 'Install: Dependencies'
        run: |
          cd ../../
          npm ci
      - name: 'Test: Unit (sf-core)'
        run: npm run test:unit
      - name: 'Test: Unit (serverless)'
        working-directory: ./packages/serverless
        run: npm run test:unit
      - name: 'Build: Minify Shim'
        run: |
          cd ../serverless/lib/plugins/aws/dev
          ../../../../../../node_modules/.bin/esbuild ./shim.js --bundle --platform=node --minify --outfile=./shim.min.js
      - name: 'Build: Framework'
        run: npm run build
      - name: 'Install: Serverless v3'
        run: npm install -g serverless@3
      - name: 'Test: Integration'
        run: npm run test -- --maxWorkers=8
        env:
          SERVERLESS_LICENSE_KEY_DEV: ${{ secrets.SERVERLESS_LICENSE_KEY_DEV }}
          SERVERLESS_ACCESS_KEY_DEV: ${{ secrets.SERVERLESS_ACCESS_KEY_DEV }}
          TEST_STAGE: pr-${{ github.event.pull_request.user.login }}
          SLS_AWS_SDK: 3
          AWS_MAX_ATTEMPTS: 7
      - name: 'Test: Resolvers'
        run: npm run test:resolvers -- --maxWorkers=8
        env:
          SERVERLESS_LICENSE_KEY_DEV: ${{ secrets.SERVERLESS_LICENSE_KEY_DEV }}
          SERVERLESS_ACCESS_KEY_DEV: ${{ secrets.SERVERLESS_ACCESS_KEY_DEV }}
          TEST_STAGE: pr-${{ github.event.pull_request.user.login }}
          AWS_MAX_ATTEMPTS: 7
