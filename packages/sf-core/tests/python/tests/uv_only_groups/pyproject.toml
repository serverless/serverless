[project]
name = "sls-uv-test"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
  "flask==3.1.3",
  "bottle",
  "requests>=2.32.5",
]

[dependency-groups]
test = [
  "pytest==9.0.3",
  "pytest-cov==4.0.0",
]

[project.optional-dependencies]
s3 = [
  "boto3==1.40.39",
]

[tool.uv.sources]
bottle = {git = "https://git@github.com/bottlepy/bottle.git", tag = "0.13.4"}
