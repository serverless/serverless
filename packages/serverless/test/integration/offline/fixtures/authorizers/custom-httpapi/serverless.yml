service: it-auth-custom-httpapi
provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
custom:
  # General offline options live under custom.serverless-offline (OUR canonical
  # config home, matching the community plugin's CUSTOM_OPTION).
  serverless-offline:
    httpPort: 0
    lambdaPort: 0
  # customAuthenticationProvider is the ONE key read from custom.offline — exact
  # parity with the community serverless-offline plugin, so the same fixture can
  # be booted by either implementation (OUR harness vs the capture helper).
  offline:
    customAuthenticationProvider: ./authProvider.js
functions:
  # A plain HTTP API (v2) route with NO explicit authorizer. When a custom
  # authentication provider is configured it authenticates EVERY route, so this
  # route is protected by the custom strategy even though it declares no
  # authorizer of its own.
  echo:
    handler: handler.echo
    events:
      - httpApi:
          method: GET
          path: /echo
