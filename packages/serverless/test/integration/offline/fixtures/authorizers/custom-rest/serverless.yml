service: it-auth-custom-rest
provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
custom:
  # OUR built-in offline reads the provider from custom.serverless-offline.
  serverless-offline:
    httpPort: 0
    lambdaPort: 0
    customAuthenticationProvider: ./authProvider.js
  # The community serverless-offline plugin reads it from custom.offline. Both
  # keys point at the same provider so the same fixture can be booted by either
  # implementation (OUR harness vs the capture helper).
  offline:
    customAuthenticationProvider: ./authProvider.js
functions:
  # A plain REST (v1) route with NO explicit authorizer. When a custom
  # authentication provider is configured it authenticates EVERY route, so this
  # route is protected by the custom strategy even though it declares no
  # authorizer of its own.
  echo:
    handler: handler.echo
    events:
      - http:
          method: GET
          path: /echo
