service: it-config-compat
provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
# serverless-offline's own config home + property names (NO plugin installed,
# so OUR built-in offline command runs). httpPort + lambdaPort map directly onto
# the built-in HTTP / Lambda servers. websocketPort is a recognized option (the
# WS server simply isn't started here because the fixture has no websocket
# events). resourceRoutes is genuinely unsupported, so it triggers the one-time
# "ignoring" boot warning. reloadHandler:false disables hot reload.
custom:
  serverless-offline:
    httpPort: 4170
    lambdaPort: 4172
    websocketPort: 3001
    resourceRoutes: true
    reloadHandler: false
functions:
  ping:
    handler: handler.ping
    events:
      - httpApi: { method: GET, path: /ping }
